name: Bug report
description: Report a problem
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and how to reproduce it.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - auto
        - cpu
        - mlx
        - metal
    validations:
      required: false
