name: Benchmark regression

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_FROZEN: true

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
          enable-cache: false
      - run: uv sync
      - name: Compare against latest release
        run: |
          uv run python benchmarks/bench_versions.py \
            --versions latest \
            --backends cpu \
            --qubits 6 8 10 \
            --depth 12 \
            --reps 1 \
            --threshold 75 \
            --json benchmarks/data/ci-version-regression.json
